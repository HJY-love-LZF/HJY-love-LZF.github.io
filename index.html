<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HJY love LZF forever</title>
    <style>
        /* 基础重置与滚动捕捉 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scroll-behavior: smooth;
            font-family: 'Segoe UI', 'Arial', 'Helvetica', sans-serif;
        }

        /* 隐藏滚动条（视觉干净） */
        body::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 固定粒子画布 */
        #loveParticles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 1;
            pointer-events: none;
        }

        /* 每一屏 */
        .section {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            background-color: transparent; /* 颜色由各自屏自己设置 */
        }

        .section-red {
            background-color: #FF3B3B;      /* 纯红 */
        }

        .section-black {
            background-color: #000000;      /* 纯黑 */
        }

        /* 内容容器：相对定位，z-index高于粒子 */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: white;
            pointer-events: none;            /* 穿透点击，让引导箭头可点(单独设置) */
        }

        /* ========== 第一页 ========== */
        .first-page-content {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .top-line {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 600;
            letter-spacing: 0.02em;
            white-space: nowrap;
            animation: softGlow 3s infinite alternate;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .separator {
            width: min(220px, 40%);
            height: 2px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 4px;
            margin: 0.5rem 0 1rem 0;
            box-shadow: 0 0 12px rgba(255, 220, 180, 0.8);
            backdrop-filter: blur(1px);
        }

        .bottom-line {
            font-size: clamp(1.6rem, 5vw, 3.5rem);
            font-weight: 300;
            font-style: italic;
            white-space: nowrap;
            animation: softGlow 3s infinite alternate;
            line-height: 1.2;
            opacity: 0.95;
        }

        /* 向下引导标识（小箭头） */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            color: rgba(255, 255, 255, 0.9);
            font-size: 2rem;
            line-height: 1;
            text-shadow: 0 0 12px rgba(255, 200, 160, 0.8);
            animation: bounce 2s infinite;
            pointer-events: auto;
        }
        .scroll-indicator a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 0 10px;
        }

        @keyframes bounce {
            0%,20%,50%,80%,100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-12px); }
            60% { transform: translateX(-50%) translateY(-6px); }
        }

        /* ========== 第二页 ========== */
        .second-page-content {
            display: flex;
            flex-direction: column;
            padding: 0 0 20px 0;        /* 底部预留20px，确保竖线底边不贴边 */
            height: 100%;
        }

        /* “关于我们”标题：上移，通过margin-top控制顶部距离，margin-bottom=0 */
        .about-title {
            text-align: center;
            margin: 5vh 0 0 0;           /* 距离顶部5vh，让出呼吸空间 */
            font-size: clamp(2rem, 7vw, 4rem);   /* 略小一点 */
            font-weight: 400;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.7), 0 0 40px #fff;
            white-space: nowrap;
            animation: whiteGlow 3s infinite alternate;
        }

        /* 中间区域：flex:1，margin-top:20px 使其与标题底部相距20px */
        .middle-area {
            flex: 1;
            position: relative;
            margin-top: 20px;             /* 标题底部与中间区域顶部距离20px */
        }

        /* 发光的竖线 */
        .glowing-line {
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;                  /* 高度充满middle-area，因此顶端与middle-area顶部齐平，底端与底部齐平 */
            background: linear-gradient(to bottom, transparent, white, transparent);
            box-shadow: 0 0 25px 5px rgba(255,255,255,0.8);
            border-radius: 2px;
            z-index: 3;
        }

        /* 左右文字共用样式 */
        .side-text {
            position: absolute;
            top: 0;                         /* 顶部与竖线上端对齐（即middle-area顶部） */
            font-size: clamp(1.8rem, 6vw, 3.5rem);   /* 略小于标题 */
            font-weight: 500;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px #ffffff;
            white-space: nowrap;
            z-index: 3;
            animation: whiteGlow 3s infinite alternate;
        }

        /* 左侧 HJY */
        .left-hjy {
            right: 55%;                    /* 从右侧向左定位，确保在竖线左边 */
            transform: translateY(0);        /* 顶部对齐，无需Y偏移 */
            /* 保证文字不超出，通过右边界控制 */
        }

        /* 右侧 LZF */
        .right-lzf {
            left: 55%;                      /* 从左侧向右定位 */
            transform: translateY(0);
        }

        /* 响应式调整：小屏时避免重叠 */
        @media (max-width: 600px) {
            .left-hjy {
                right: 60%;
                font-size: clamp(1.5rem, 5vw, 2.5rem);
            }
            .right-lzf {
                left: 60%;
                font-size: clamp(1.5rem, 5vw, 2.5rem);
            }
            .about-title {
                font-size: clamp(1.8rem, 6vw, 3rem);
                margin-top: 3vh;
            }
            .middle-area {
                margin-top: 15px;            /* 小屏适当缩小间距 */
            }
        }

        /* 发光动画（白色系） */
        @keyframes whiteGlow {
            0% { text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 40px #ffffff; }
            100% { text-shadow: 0 0 30px rgba(255,255,255,1), 0 0 70px #ffffff; }
        }

        @keyframes softGlow {
            0% { text-shadow: 0 0 20px rgba(255, 240, 210, 0.8), 0 0 40px #ff8a8a; }
            100% { text-shadow: 0 0 30px rgba(255, 255, 220, 1), 0 0 60px #ff6f6f; }
        }
    </style>
</head>
<body>

    <!-- 固定粒子画布（白色粒子） -->
    <canvas id="loveParticles"></canvas>

    <!-- 第一屏：纯红背景 -->
    <section class="section section-red">
        <div class="content first-page-content">
            <div class="top-line">HJY love LZF</div>
            <div class="separator"></div>
            <div class="bottom-line">forever & always</div>
        </div>
        <div class="scroll-indicator">
            <a href="#page2">▼</a>
        </div>
    </section>

    <!-- 第二屏：纯黑背景，ID用于锚点 -->
    <section class="section section-black" id="page2">
        <div class="content second-page-content">
            <!-- “关于我们”标题（上移） -->
            <div class="about-title">关于我们</div>
            <!-- 中间区域：包含竖线和两侧文字，margin-top:20px保证与标题距离 -->
            <div class="middle-area">
                <!-- 发光的竖线（高度100%，顶端即middle-area顶部） -->
                <div class="glowing-line"></div>
                <!-- 左侧 HJY (顶部与竖线上端对齐) -->
                <div class="side-text left-hjy">HJY</div>
                <!-- 右侧 LZF -->
                <div class="side-text right-lzf">LZF</div>
            </div>
            <!-- 底部由父容器padding-bottom:20px留白，无需额外元素 -->
        </div>
    </section>

    <script>
        (function() {
            // ---------- 粒子效果：纯白色/灰白色粒子 ----------
            const canvas = document.getElementById('loveParticles');
            const ctx = canvas.getContext('2d');

            let particles = [];
            let width = window.innerWidth;
            let height = window.innerHeight;
            const PARTICLE_COUNT = 160;            // 稍多一点，白色更轻盈

            class Particle {
                constructor(x, y, vx, vy, radius, color) {
                    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                    this.radius = radius; this.color = color;
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    const vx = (Math.random() - 0.5) * 0.3;   // 更慢，更静谧
                    const vy = (Math.random() - 0.5) * 0.3;
                    const radius = Math.random() * 4 + 2;      // 2~6px
                    
                    // 白色粒子：饱和度为0，亮度70%~100%，透明度0.3~0.8
                    const lightness = Math.floor(Math.random() * 30 + 70); // 70~100
                    const alpha = Math.random() * 0.5 + 0.2;    // 0.2~0.7

                    const color = `hsla(0, 0%, ${lightness}%, ${alpha})`;  // 纯白或灰白
                    
                    particles.push(new Particle(x, y, vx, vy, radius, color));
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                if (particles.length > 0) {
                    particles.forEach(p => {
                        p.x = ((p.x % width) + width) % width;
                        p.y = ((p.y % height) + height) % height;
                    });
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);   // 透明背景，露出下方section背景色
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    // 淡淡光晕
                    if (p.radius > 3) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius * 2, 0, Math.PI * 2);
                        ctx.fillStyle = p.color.replace(/[\d\.]+\)$/, '0.1)');
                        ctx.fill();
                    }
                });
            }

            function updateParticles() {
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    // 环绕处理
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                });
            }

            function animate() {
                updateParticles();
                drawParticles();
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            window.addEventListener('load', () => {
                resizeCanvas();
                initParticles();
                animate();
            });
        })();
    </script>
</body>
</html>
