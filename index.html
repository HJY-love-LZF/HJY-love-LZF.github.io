                    <div class="info-desc">我叫HJY，来自吉林长春，是一名ENFJ人格的男生。目前在长春市净月实验中学就读。朋友们说我长得还算帅气，最重要的是特别有礼貌，对人总是谦逊温和。我的声音不错，说话不急不慢，很多人说听我说话很治愈。作为ENFJ，我能敏锐察觉别人的情绪，默默关心身边的人。在接下来的日子里我会更用心的呵护你

    <script>
        (function() {
            const canvas = document.getElementById('loveParticles');
            const ctx = canvas.getContext('2d');

            let particles = [];
            let width = window.innerWidth;
            let height = window.innerHeight;
            const PARTICLE_COUNT = 160;

            class Particle {
                constructor(x, y, vx, vy, radius, color) {
                    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                    this.radius = radius; this.color = color;
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    const vx = (Math.random() - 0.5) * 0.3;
                    const vy = (Math.random() - 0.5) * 0.3;
                    const radius = Math.random() * 4 + 2;
                    
                    const lightness = Math.floor(Math.random() * 30 + 70);
                    const alpha = Math.random() * 0.5 + 0.2;
                    const color = `hsla(0, 0%, ${lightness}%, ${alpha})`;
                    
                    particles.push(new Particle(x, y, vx, vy, radius, color));
                }
            }

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                if (particles.length > 0) {
                    particles.forEach(p => {
                        p.x = ((p.x % width) + width) % width;
                        p.y = ((p.y % height) + height) % height;
                    });
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    if (p.radius > 3) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius * 2, 0, Math.PI * 2);
                        ctx.fillStyle = p.color.replace(/[\d\.]+\)$/, '0.1)');
                        ctx.fill();
                    }
                });
            }

            function updateParticles() {
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = width;
                    if (p.x > width) p.x = 0;
                    if (p.y < 0) p.y = height;
                    if (p.y > height) p.y = 0;
                });
            }

            function animate() {
                updateParticles();
                drawParticles();
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            window.addEventListener('load', () => {
                resizeCanvas();
                initParticles();
                animate();
            });
        })();
    </script>
